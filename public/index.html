<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System Information Manager — Dashboard</title>
  <meta name="description" content="A professional Node.js dashboard for system monitoring, environment variable inspection, and workspace file management." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <!-- ─── Toast Container ───────────────────────────────── -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- ─── Loading Overlay ───────────────────────────────── -->
  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="spinner"></div>
  </div>

  <!-- ─── Mobile Header ─────────────────────────────────── -->
  <header class="mobile-header" role="banner">
    <button id="menu-toggle" class="menu-toggle" aria-label="Toggle navigation menu">
      <span></span><span></span><span></span>
    </button>
    <h1 class="mobile-title">SysInfo Manager</h1>
  </header>

  <!-- ─── Sidebar ────────────────────────────────────────── -->
  <aside id="sidebar" class="sidebar" role="navigation" aria-label="Main navigation">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">⚙️</span>
        <span class="logo-text">SysInfo<span class="logo-accent">Manager</span></span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a href="#dashboard" class="nav-item active" data-page="dashboard" aria-label="Dashboard">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a href="#system" class="nav-item" data-page="system" aria-label="System Information">
        <span class="nav-icon">🖥️</span>
        <span class="nav-label">System Info</span>
      </a>
      <a href="#env" class="nav-item" data-page="env" aria-label="Environment Variables">
        <span class="nav-icon">🔑</span>
        <span class="nav-label">Env Variables</span>
      </a>
      <a href="#files" class="nav-item" data-page="files" aria-label="File Manager">
        <span class="nav-icon">📁</span>
        <span class="nav-label">File Manager</span>
      </a>
      <a href="#settings" class="nav-item" data-page="settings" aria-label="Settings">
        <span class="nav-icon">⚡</span>
        <span class="nav-label">Settings</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-version">v1.0.0</div>
    </div>
  </aside>

  <!-- ─── Sidebar Overlay (mobile) ──────────────────────── -->
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <!-- ─── Main Content ──────────────────────────────────── -->
  <main id="main-content" class="main-content" role="main">
    <!-- Pages rendered here by JS -->
  </main>

  <!-- ─── Modal Container ───────────────────────────────── -->
  <div id="modal-backdrop" class="modal-backdrop hidden" role="dialog" aria-modal="true">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title"></h3>
        <button class="modal-close" id="modal-close" aria-label="Close modal">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <!-- ─── Scripts ────────────────────────────────────────── -->
  <script src="/js/api.js"></script>
  <script src="/js/pages/dashboard.js"></script>
  <script src="/js/pages/systemInfo.js"></script>
  <script src="/js/pages/envVars.js"></script>
  <script src="/js/pages/fileManager.js"></script>
  <script src="/js/pages/settings.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
